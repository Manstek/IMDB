{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини IMDB - Список фильмов</title>
    <link rel="stylesheet" href="{% static "css/movies.css" %}"/>
</head>
<body>
    <h1>Мини IMDB - Список фильмов</h1>

    {% for movie in movies %}
        <div class="movie">
            <div class="movie-title">{{ movie.title }}</div>
            <div class="movie-meta">
                <span class="movie-authors">{{ movie.author }}</span> | 
                <span class="movie-year">Год: {{ movie.year }}</span>
            </div>
            <div class="movie-description">
                {{ movie.description }}
            </div>
            <div class="movie-rating">Рейтинг: {{ movie.rating }}</div>
        </div>
    {% endfor %}

    <div class="movies-count">
        Всего фильмов: {{ movies.count }}
    </div>
</body>
</html>
